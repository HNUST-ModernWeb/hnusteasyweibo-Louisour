<!-- src/main/resources/templates/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 简意微博</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3rem;
            color: #1da1f2;
        }
        .login-header h2 {
            margin-top: 0.5rem;
            color: #333;
        }
        .form-control {
            border-radius: 30px;
            padding: 12px 20px;
        }
        .btn-login {
            border-radius: 30px;
            padding: 10px;
            background: #1da1f2;
            border: none;
            font-weight: 600;
        }
        .btn-login:hover {
            background: #0c8de0;
        }
        .test-accounts {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fab fa-twitter"></i>
            <h2>简意微博</h2>
            <p class="text-muted">登录后分享你的想法</p>
        </div>
        
        <form action="/doLogin" method="post">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="用户名" required autofocus>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" name="password" placeholder="密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>登录
            </button>
            <div class="test-accounts mt-3">
                <small>测试账号: admin / 123456 &nbsp;&nbsp;|&nbsp;&nbsp; test / 123456</small>
            </div>
        </form>
        
        <!-- 显示错误信息 -->
        <div th:if="${error}" class="alert alert-danger mt-3" role="alert" th:text="${error}"></div>
    </div>
</body>
</html>
