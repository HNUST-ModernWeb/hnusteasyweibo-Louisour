<!-- src/main/resources/templates/index.html -->
<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简意微博 · 轻分享</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

<div class="container py-4" style="max-width: 700px;">
    <!-- 头部 - 增加用户信息和登出按钮 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 text-primary"><i class="fab fa-twitter me-2"></i>简意微博</h1>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted small">
                <i class="fas fa-user-circle me-1"></i>
                <span th:text="${username}">用户</span>
            </span>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newPostModal">
                <i class="fas fa-feather-alt me-1"></i> 发动态
            </button>
            <a href="/logout" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-sign-out-alt me-1"></i> 登出
            </a>
        </div>
    </div>

    <!-- 动态列表 -->
    <div id="postsContainer">
        <!-- 动态卡片会由js动态渲染 -->
    </div>
</div>

<!-- 发布动态模态框 - 移除昵称输入框 -->
<div class="modal fade" id="newPostModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit me-1"></i>发布新动态</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">说点什么</label>
                    <textarea class="form-control" id="postContent" rows="3" placeholder="分享新鲜事..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">图片 (可选)</label>
                    <input type="file" class="form-control" id="postImage" accept="image/jpeg,image/png,image/gif">
                    <div id="imagePreview" class="mt-2" style="max-height: 150px; display: none;">
                        <img src="" class="img-fluid rounded" id="previewImg">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="submitPostBtn">发布</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        fetchPosts();
    });
</script>
</body>
</html>
